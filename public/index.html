<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Pro Video Downloader ⚡</title>
    <meta name="description" content="Download video kualitas HD dari TikTok, YouTube, Instagram, dan Twitter tanpa ribet. Gratis dan cepat!">
    <meta property="og:title" content="Pro Video Downloader ⚡">
    <meta property="og:description" content="Download video favoritmu tanpa watermark dalam hitungan detik.">
    <meta property="og:image" content="https://via.placeholder.com/800x400.png?text=Pro+Video+Downloader">
    <meta property="og:type" content="website">

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --success: #10b981; --error: #ef4444; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: var(--card); padding: 35px 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 420px; text-align: center; }
        h2 { margin-top: 0; color: #38bdf8; letter-spacing: 0.5px; }
        input { width: 100%; padding: 14px; margin: 15px 0; border-radius: 8px; border: 1px solid #475569; background: var(--bg); color: white; box-sizing: border-box; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 15px;}
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        .result-card { background: #334155; border-radius: 10px; padding: 18px; margin-top: 25px; animation: slideUp 0.4s ease-out; }
        .result-card img { width: 100%; border-radius: 8px; margin-bottom: 15px; object-fit: cover; max-height: 220px; }
        .badge { background: var(--error); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .btn-dl { display: block; width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; font-weight: bold; color: white; border: none; cursor: pointer; transition: 0.2s;}
        .btn-hd { background: var(--success); }
        .btn-sd { background: #64748b; }
        .btn-dl:hover { filter: brightness(1.1); }
        
        /* TOAST NOTIFICATION STYLES */
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
        #toast.error { background-color: var(--error); }
        #toast.success { background-color: var(--success); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Pro Downloader</h2>
    <p style="color:#94a3b8; font-size:13px; margin-top:-5px;">Support: TikTok, YouTube, IG, X/Twitter</p>
    
    <input type="text" id="urlInput" placeholder="Tempel URL video di sini..." autocomplete="off">
    <button id="btnCari" onclick="cariInfo()">Cari Video</button>
    
    <div id="result"></div>
</div>

<div id="toast">Notifikasi muncul di sini</div>

<script>
    // FUNGSI SECURITY: Anti DOM XSS
    function escapeHTML(str) {
        if (!str) return 'Video';
        return str.replace(/[&<>'"]/g, tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[tag]));
    }

    // FUNGSI TOAST PROFESIONAL
    function showToast(message, type = 'error') {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = `show ${type}`;
        setTimeout(() => { toast.className = toast.className.replace(`show ${type}`, ""); }, 3000);
    }

    async function cariInfo() {
        const url = document.getElementById('urlInput').value.trim();
        const btn = document.getElementById('btnCari');
        const resultDiv = document.getElementById('result');

        if (!url) { 
            showToast("Wajib isi URL dulu, bos!", "error"); 
            return; 
        }

        btn.innerText = " Membedah Link...";
        btn.disabled = true;
        resultDiv.innerHTML = "";

        try {
            // ---> INI LINK MESIN BACK4APP LU <---
            const res = await fetch('https://alldownloader-t0fqnydn.b4a.run/api/info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            const responseData = await res.json();

            if (responseData.success) {
                const data = responseData.data;
                
                // Menerapkan Security XSS sebelum render ke layar
                const amanTitle = escapeHTML(data.title);
                const encodedJudul = encodeURIComponent(amanTitle);

                resultDiv.innerHTML = `
                    <div class="result-card">
                        <span class="badge">${data.platform ? escapeHTML(data.platform) : 'SOSMED'}</span>
                        <h4 style="margin: 15px 0; font-size: 15px;">${amanTitle}</h4>
                        <img src="${data.thumbnail}" alt="Cover Video">
                        
                        <button class="btn-dl btn-hd" onclick="unduh('${encodeURIComponent(url)}', 'hd', '${encodedJudul}')">
                             Download HD
                        </button>
                        <button class="btn-dl btn-sd" onclick="unduh('${encodeURIComponent(url)}', 'sd', '${encodedJudul}')">
                             Download Biasa
                        </button>
                    </div>
                `;
            } else {
                showToast(`Error: ${responseData.message}`, "error");
            }
        } catch (err) {
            showToast("Gagal terhubung ke Backend!", "error");
            console.error("Detail Error:", err);
        }

        btn.innerText = "Cari Video";
        btn.disabled = false;
    }

    function unduh(encodedUrl, quality, encodedTitle) {
        showToast(" Sedang memproses... File akan terunduh otomatis.", "success");
        
        // ---> INI LINK DOWNLOAD BACK4APP LU <---
        const downloadUrl = `https://alldownloader-t0fqnydn.b4a.run/api/download?url=${encodedUrl}&quality=${quality}&title=${encodedTitle}`;
        
        window.location.href = downloadUrl;
    }
</script>

</body>
</html>
