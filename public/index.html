<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Pro Video Downloader ⚡</title>
    <meta name="description" content="Download video kualitas HD dari TikTok, YouTube, Instagram, dan Twitter tanpa ribet. Gratis dan cepat!">
    <meta property="og:title" content="Pro Video Downloader ⚡">
    <meta property="og:description" content="Download video favoritmu tanpa watermark dalam hitungan detik.">
    <meta property="og:image" content="https://via.placeholder.com/800x400.png?text=Pro+Video+Downloader">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Pro Downloader</h2>
    <div class="subtitle">Support: TikTok, YouTube, Instagram, X/Twitter</div>
    
    <input type="text" id="urlInput" placeholder="🔗 Tempel URL video di sini..." autocomplete="off">
    <button id="btnCari" class="btn-main" onclick="cariInfo()">
        <span class="spinner" id="loadingSpinner"></span>
        <span id="btnText">Cari Video</span>
    </button>
    
    <div id="result"></div>
</div>

<div id="toast">Notifikasi muncul di sini</div>

<script>
    function escapeHTML(str) {
        if (!str) return 'Video';
        return str.replace(/[&<>'"]/g, tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[tag]));
    }

    function showToast(message, type = 'error') {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = `show ${type}`;
        setTimeout(() => { toast.className = toast.className.replace(`show ${type}`, ""); }, 3000);
    }

    async function cariInfo() {
        const url = document.getElementById('urlInput').value.trim();
        const btn = document.getElementById('btnCari');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('loadingSpinner');
        const resultDiv = document.getElementById('result');

        if (!url) { 
            showToast("Wajib isi URL dulu, bos!", "error"); 
            return; 
        }

        // Animasi Loading
        btn.disabled = true;
        btnText.innerText = "Memproses...";
        spinner.style.display = "inline-block";
        resultDiv.innerHTML = "";

        try {
            const res = await fetch('/api/info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            const responseData = await res.json();

            if (responseData.success) {
                const data = responseData.data;
                const amanTitle = escapeHTML(data.title);
                const encodedJudul = encodeURIComponent(amanTitle);

                resultDiv.innerHTML = `
                    <div class="result-card">
                        <span class="badge">${data.platform ? escapeHTML(data.platform) : 'MEDIA'}</span>
                        <h4 class="video-title">${amanTitle}</h4>
                        <img src="${data.thumbnail}" alt="Cover Video">
                        
                        <button class="btn-dl btn-hd" onclick="unduh('${encodeURIComponent(url)}', 'hd', '${encodedJudul}')">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Download Kualitas HD
                        </button>
                        <button class="btn-dl btn-sd" onclick="unduh('${encodeURIComponent(url)}', 'sd', '${encodedJudul}')">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                            Download Kualitas SD
                        </button>
                    </div>
                `;
            } else {
                showToast(`Error: ${responseData.message}`, "error");
            }
        } catch (err) {
            showToast("Gagal terhubung ke Backend!", "error");
        }

        // Kembalikan tombol seperti semula
        btnText.innerText = "Cari Video";
        spinner.style.display = "none";
        btn.disabled = false;
    }

    function unduh(encodedUrl, quality, encodedTitle) {
        showToast("⏳ File sedang diunduh, mohon tunggu sebentar...", "success");
        const downloadUrl = `/api/download?url=${encodedUrl}&quality=${quality}&title=${encodedTitle}`;
        window.location.href = downloadUrl;
    }
</script>

</body>
</html>
